<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      name="description"
      content="Decode EVM transaction calldata recursively. Supports multicalls, batched transactions, and nested ABI-encoded calls."
    />
    <meta property="og:title" content="Recursive Calldata Decoder" />
    <meta
      property="og:description"
      content="Decode EVM transaction calldata recursively. Supports multicalls, batched transactions, and nested ABI-encoded calls."
    />
    <meta property="og:type" content="website" />
    <!-- Relative og:image resolves against the shared URL; use absolute URLs in production for best crawlers. -->
    <meta property="og:image" content="/favicon-32x32.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#030712" />
    <meta name="color-scheme" content="dark" />
    <link rel="preconnect" href="https://api.openchain.xyz" crossorigin />
    <link rel="preconnect" href="https://eth.llamarpc.com" crossorigin />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="manifest" href="/manifest.json" />
    <!--
      CSP: style-src 'unsafe-inline' is typical for Vite/React. Do not concatenate user/decoded
      text into inline style attributes or <style> blocks — keep styling in static CSS / Tailwind.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        connect-src 'self'
          https://www.4byte.directory
          https://api.openchain.xyz
          https://api.4byte.sourcify.dev
          https://eth.llamarpc.com
          https://ethereum-rpc.publicnode.com
          https://eth.drpc.org
          https://1rpc.io
          https://arbitrum-one-rpc.publicnode.com
          https://arbitrum.drpc.org
          https://base-rpc.publicnode.com
          https://base.drpc.org
          https://polygon-rpc.com
          https://polygon.drpc.org
          https://mainnet.optimism.io
          https://optimism.drpc.org
          https://rpc.hyperliquid.xyz;
        img-src 'self' data: https:;
        font-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'none';
        upgrade-insecure-requests;
      "
    />
    <title>Recursive Calldata Decoder</title>
  </head>
  <body class="bg-gray-950 text-gray-100">
    <noscript>
      <div
        style="padding: 20px; text-align: center; background-color: #030712; color: #f3f4f6; font-family: system-ui, sans-serif"
      >
        JavaScript is required to decode calldata. Please enable JavaScript to use this tool.
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
